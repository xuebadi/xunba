name: Build Linux App

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y tesseract-ocr tesseract-ocr-chi-sim tesseract-ocr-chi-tra

      - name: Install Node dependencies
        run: npm install

      - name: Install llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp
          cd /tmp/llama.cpp
          cmake -B build -DLLAMA_SERVER=ON -DLLAMA_BUILD_EXAMPLES=ON
          cmake --build build --config Release -j$(nproc)
          sudo cp build/bin/llama-server /usr/local/bin/

      - name: Prepare binaries
        run: |
          mkdir -p bin lib ocr-helper
          cp /usr/local/bin/llama-server bin/
          cp ocr-helper/ocr-helper-linux ocr-helper/ocr-helper
          chmod +x ocr-helper/ocr-helper

      - name: Build Linux AppImage
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: npx electron-builder --linux AppImage --x64 || true

      - name: Upload AppImage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xunba-appimage
          path: dist/*.AppImage
          retention-days: 7

      - name: Build Linux deb
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: npx electron-builder --linux deb --x64 || true

      - name: Upload deb
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xunba-deb
          path: dist/*.deb
          retention-days: 7

  upload-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: xunba-appimage

      - name: Download deb
        uses: actions/download-artifact@v4
        with:
          name: xunba-deb

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.AppImage
            *.deb
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
