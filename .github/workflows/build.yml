name: Build Linux App

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y tesseract-ocr tesseract-ocr-chi-sim tesseract-ocr-chi-tra

      - name: Install Node dependencies
        run: npm ci

      - name: Install llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp
          cd /tmp/llama.cpp
          cmake -B build -DLLAMA_SERVER=ON -DLLAMA_BUILD_EXAMPLES=ON
          cmake --build build --config Release -j$(nproc)
          sudo cp build/bin/llama-server /usr/local/bin/

      - name: Build Linux packages
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: |
          mkdir -p bin lib ocr-helper
          cp /usr/local/bin/llama-server bin/
          cp ocr-helper/ocr-helper-linux ocr-helper/ocr-helper
          npm run build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
