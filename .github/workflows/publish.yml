name: Upload to Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download artifacts
        run: |
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/artifacts/6708776174/zip" \
            -o xunba-appimage.zip
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/artifacts/6708807272/zip" \
            -o xunba-deb.zip
          ls -lh *.zip

      - name: Upload to Release
        run: |
          python3 -c "
          import urllib.request, urllib.parse, json, os

          token = os.environ['GITHUB_TOKEN']
          repo = '${{ github.repository }}'
          api = 'https://api.github.com'

          # Get latest release ID
          req = urllib.request.Request(
              f'{api}/repos/{repo}/releases/latest',
              headers={'Authorization': f'Bearer {token}'}
          )
          with urllib.request.urlopen(req) as r:
              rel = json.loads(r.read())
              rel_id = rel['id']
              upload_url = rel['upload_url']
              print(f'Release ID: {rel_id}')
              print(f'Upload URL template: {upload_url}')

          # Upload files using uploads.github.com
          base_url = upload_url.split('{')[0]
          for fname in ['xunba-appimage.zip', 'xunba-deb.zip']:
              if not os.path.exists(fname):
                  print(f'SKIP: {fname} not found')
                  continue
              size = os.path.getsize(fname)
              print(f'Uploading {fname} ({size//1024//1024}MB)...')

              with open(fname, 'rb') as f:
                  data = f.read()

              display_name = fname
              url = f'{base_url}?name={urllib.parse.quote(display_name)}'
              req = urllib.request.Request(
                  url,
                  data=data,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Content-Type': 'application/zip',
                  },
                  method='POST'
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      asset = json.loads(r.read())
                      print(f'  OK: {asset[\"name\"]} ({asset[\"size\"]//1024//1024}MB)')
              except Exception as e:
                  body = e.read() if hasattr(e, 'read') else str(e)
                  print(f'  ERROR: {body}')
          "
